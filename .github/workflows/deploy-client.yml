name: Deploy client

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy-client.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-client-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVICE: mavuno-client
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        id: build
        env:
          API_URL: ${{ vars.SERVER_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::warning::vars.SERVER_URL is not set — the client bundle will have an empty NEXT_PUBLIC_API_URL. Set it to the deployed Cloud Run server URL and redeploy."
          fi
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${SERVICE}:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="$API_URL" \
            -f client/Dockerfile.prod \
            -t "$IMAGE" \
            client
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ steps.build.outputs.image }}
          service_account: ${{ vars.RUNTIME_SA }}
          flags: >-
            --allow-unauthenticated
            --cpu=1 --memory=512Mi --min-instances=0 --max-instances=3

      - name: Show service URL
        run: echo "Deployed ${SERVICE} -> ${{ steps.deploy.outputs.url }}"
