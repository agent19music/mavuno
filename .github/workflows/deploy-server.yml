name: Deploy server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVICE: mavuno-server
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        id: build
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/${SERVICE}:${{ github.sha }}"
          docker build -f server/Dockerfile.prod -t "$IMAGE" server
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ steps.build.outputs.image }}
          service_account: ${{ vars.RUNTIME_SA }}
          flags: >-
            --allow-unauthenticated
            --add-cloudsql-instances=${{ vars.CLOUDSQL_CONNECTION }}
            --cpu=1 --memory=512Mi --min-instances=0 --max-instances=3
          env_vars: |
            DJANGO_DEBUG=False
            DJANGO_ALLOWED_HOSTS=*
            CORS_ALLOWED_ORIGINS=${{ vars.CLIENT_URL }}
            DJANGO_CSRF_TRUSTED_ORIGINS=${{ vars.CLIENT_URL }}
          secrets: |
            DJANGO_SECRET_KEY=django-secret-key:latest
            DATABASE_URL=database-url:latest

      - name: Show service URL
        run: echo "Deployed ${SERVICE} -> ${{ steps.deploy.outputs.url }}"
