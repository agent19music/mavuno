name: Deploy server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVICE: mavuno-server
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER || secrets.WIF_PROVIDER }}
      DEPLOYER_SA: ${{ vars.DEPLOYER_SA || secrets.DEPLOYER_SA }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || secrets.GCP_REGION }}
      GCP_AR_REPO: ${{ vars.GCP_AR_REPO || secrets.GCP_AR_REPO }}
      RUNTIME_SA: ${{ vars.RUNTIME_SA || secrets.RUNTIME_SA }}
      CLOUDSQL_CONNECTION: ${{ vars.CLOUDSQL_CONNECTION || secrets.CLOUDSQL_CONNECTION }}
      CLIENT_URL: ${{ vars.CLIENT_URL || secrets.CLIENT_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth preflight
        run: |
          [ -n "${WIF_PROVIDER}" ] || (echo "::error::Missing WIF_PROVIDER (set as Variable or Secret)." && exit 1)
          [ -n "${DEPLOYER_SA}" ] || (echo "::error::Missing DEPLOYER_SA (set as Variable or Secret)." && exit 1)
          [ -n "${GCP_REGION}" ] || (echo "::error::Missing GCP_REGION (set as Variable or Secret)." && exit 1)
          [ -n "${GCP_PROJECT_ID}" ] || (echo "::error::Missing GCP_PROJECT_ID (set as Variable or Secret)." && exit 1)
          [ -n "${GCP_AR_REPO}" ] || (echo "::error::Missing GCP_AR_REPO (set as Variable or Secret)." && exit 1)
          [ -n "${RUNTIME_SA}" ] || (echo "::error::Missing RUNTIME_SA (set as Variable or Secret)." && exit 1)
          [ -n "${CLOUDSQL_CONNECTION}" ] || (echo "::error::Missing CLOUDSQL_CONNECTION (set as Variable or Secret)." && exit 1)

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        id: build
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/${SERVICE}:${{ github.sha }}"
          docker build -f server/Dockerfile.prod -t "$IMAGE" server
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ steps.build.outputs.image }}
          service_account: ${{ env.RUNTIME_SA }}
          flags: >-
            --allow-unauthenticated
            --add-cloudsql-instances=${{ env.CLOUDSQL_CONNECTION }}
            --cpu=1 --memory=512Mi --min-instances=0 --max-instances=3
          env_vars: |
            DJANGO_DEBUG=False
            DJANGO_ALLOWED_HOSTS=*
            CORS_ALLOWED_ORIGINS=${{ env.CLIENT_URL }}
            DJANGO_CSRF_TRUSTED_ORIGINS=${{ env.CLIENT_URL }}
          secrets: |
            DJANGO_SECRET_KEY=django-secret-key:latest
            DATABASE_URL=database-url:latest

      - name: Show service URL
        run: echo "Deployed ${SERVICE} -> ${{ steps.deploy.outputs.url }}"
