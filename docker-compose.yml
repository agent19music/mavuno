services:
  server:
    build: ./server
    container_name: mavuno-server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - server_pycache:/app/__pycache__
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "dev-insecure-change-me"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,server"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"

  client:
    build: ./client
    container_name: mavuno-client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next
    command: ["/bin/sh", "/app/docker-entrypoint-dev.sh"]
    environment:
      CI: "true"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      API_URL_INTERNAL: "http://server:8000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - server

volumes:
  server_pycache:
  client_node_modules:
  client_next:
